

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video Summary | AI Video Summarizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
      color: white;
      min-height: 100vh;
    }

    .page-title {
      text-align: center;
      padding: 40px 0 30px 0;
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* VIDEO CARD */
    .video-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 20px;
      height: 100%;
    }
    .video-card h5 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 15px;
      color: rgba(255,255,255,0.8);
    }
    .ratio iframe { border-radius: 12px; }

    /* SUMMARY CARD */
    .summary-card {
      background: linear-gradient(135deg, rgba(255,138,0,0.1), rgba(229,46,113,0.1));
      border: 1px solid rgba(255,138,0,0.25);
      border-radius: 20px;
      padding: 25px;
      height: 100%;
      position: relative;
      overflow: hidden;
    }
    .summary-card::before {
      content: '';
      position: absolute;
      top: -50px; right: -50px;
      width: 150px; height: 150px;
      background: radial-gradient(circle, rgba(255,138,0,0.15), transparent);
      border-radius: 50%;
    }
    .summary-card h5 {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 15px;
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .summary-card p {
      color: rgba(255,255,255,0.85);
      line-height: 1.8;
      font-size: 0.95rem;
    }

    /* KEY POINTS */
    .keypoints-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 30px;
      margin-top: 25px;
    }
    .keypoints-card h5 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 20px;
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .key-point-item {
      display: flex;
      align-items: flex-start;
      gap: 15px;
      padding: 14px 18px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      margin-bottom: 12px;
      transition: 0.3s;
      animation: fadeInLeft 0.4s ease forwards;
      opacity: 0;
    }
    .key-point-item:hover {
      background: rgba(255,138,0,0.08);
      border-color: rgba(255,138,0,0.3);
      transform: translateX(5px);
    }
    .key-point-num {
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      color: white;
      font-size: 0.75rem;
      font-weight: 700;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .key-point-text {
      color: rgba(255,255,255,0.8);
      font-size: 0.93rem;
      line-height: 1.6;
    }

    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-15px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* BUTTONS */
    .btn-glow {
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      color: white; border: none;
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: 600;
      transition: 0.2s;
    }
    .btn-glow:hover { opacity: 0.88; color: white; }
    .btn-outline {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 12px 30px;
      font-weight: 500;
      transition: 0.2s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-outline:hover { background: rgba(255,255,255,0.08); color: white; }

    .actions-row {
      display: flex;
      gap: 15px;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 35px;
      padding-bottom: 50px;
    }
  </style>
</head>
<body>

<div class="container" style="max-width: 1000px;">

  <h2 class="page-title">📄 AI Generated Summary</h2>

  <!-- VIDEO + SUMMARY ROW -->
  <div class="row g-4">

    <!-- VIDEO -->
    <div class="col-lg-6">
      <div class="video-card">
        <h5>🎥 Video Preview</h5>
        <div class="ratio ratio-16x9">
          <iframe src="https://www.youtube.com/embed/{{ video_id }}" allowfullscreen></iframe>
        </div>
      </div>
    </div>

    <!-- SUMMARY -->
    <div class="col-lg-6">
      <div class="summary-card">
        <h5>🧠 Video Summary</h5>
        <p style="white-space: pre-line;">{{ summary }}</p>
      </div>
    </div>

  </div>

  <!-- KEY POINTS -->
  <div class="keypoints-card">
    <h5>📌 Key Points</h5>
    {% for point in key_points %}
    <div class="key-point-item" style="animation-delay: {{ loop.index0 * 0.1 }}s;">
      <div class="key-point-num">{{ loop.index }}</div>
      <div class="key-point-text">{{ point }}</div>
    </div>
    {% endfor %}
  </div>

  <!-- ACTION BUTTONS -->
  <div class="actions-row">

    <a href="/quiz" class="btn-glow">📝 Take Quiz</a>

    <form action="/save_note" method="POST" style="margin:0;">
      <input type="hidden" name="video_url" value="{{ youtube_link }}">
      <input type="hidden" name="summary" value="{{ summary }}">
      <button type="submit" class="btn-glow">📌 Save as Note</button>
    </form>

    <form action="/download_pdf" method="POST" style="margin:0;">
      <input type="hidden" name="video_url" value="{{ youtube_link }}">
      <input type="hidden" name="summary" value="{{ summary }}">
      {% for point in key_points %}
      <input type="hidden" name="key_points" value="{{ point }}">
      {% endfor %}
      <button type="submit" class="btn-glow">⬇️ Download PDF</button>
    </form>

    <a href="/" class="btn-outline">⬅ Back to Home</a>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
