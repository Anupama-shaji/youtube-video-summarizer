<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AI Video Summarizer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg,#0f0c29,#302b63,#24243e);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    }
    .login-box h2 {
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      margin-bottom: 25px;
      text-align: center;
    }
    .form-control {
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      color: white;
      border-radius: 10px;
      padding: 12px 15px;
    }
    .form-control:focus {
      background: rgba(255,255,255,0.15);
      border-color: #ff8a00;
      color: white;
      box-shadow: none;
    }
    .form-control::placeholder { color: rgba(255,255,255,0.4); }
    .btn-glow {
      background: linear-gradient(90deg,#ff8a00,#e52e71);
      color: white; border: none;
      border-radius: 50px;
      padding: 12px;
      font-weight: 600;
      width: 100%;
      margin-top: 10px;
    }
    .btn-glow:hover { opacity: 0.9; color: white; }
    .tab-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.5);
      font-size: 1rem;
      font-weight: 600;
      padding: 10px 30px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
    }
    .tab-btn.active {
      color: white;
      border-bottom: 2px solid #ff8a00;
    }
    .divider { border-color: rgba(255,255,255,0.15); margin: 20px 0; }
    .switch-text { text-align: center; margin-top: 15px; font-size: 14px; color: rgba(255,255,255,0.6); }
    .switch-text a { color: #ff8a00; text-decoration: none; }
  </style>
</head>
<body>

<div class="login-box">
  <h2>🤖 AI Summarizer</h2>

  <!-- TABS -->
  <div class="d-flex justify-content-center mb-4">
    <button class="tab-btn active" id="loginTab" onclick="showTab('login')">Login</button>
    <button class="tab-btn" id="signupTab" onclick="showTab('signup')">Sign Up</button>
  </div>

  <!-- ERROR / SUCCESS MESSAGE -->
  {% if error %}
  <div class="alert alert-danger rounded-3">{{ error }}</div>
  {% endif %}
  {% if success %}
  <div class="alert alert-success rounded-3">{{ success }}</div>
  {% endif %}

  <!-- LOGIN FORM -->
  <div id="loginForm">
    <form action="/login" method="POST">
      <input type="hidden" name="form_type" value="login">
      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Username" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <button type="submit" class="btn btn-glow">Login</button>
    </form>
    <div class="switch-text">Don't have an account? <a href="#" onclick="showTab('signup')">Sign Up</a></div>
  </div>

  <!-- SIGNUP FORM -->
  <div id="signupForm" style="display:none;">
    <form action="/login" method="POST">
      <input type="hidden" name="form_type" value="signup">
      <div class="mb-3">
        <input type="text" name="username" class="form-control" placeholder="Username" required>
      </div>
      <div class="mb-3">
        <input type="password" name="password" class="form-control" placeholder="Password" required>
      </div>
      <div class="mb-3">
        <input type="password" name="confirm_password" class="form-control" placeholder="Confirm Password" required>
      </div>
      <button type="submit" class="btn btn-glow">Create Account</button>
    </form>
    <div class="switch-text">Already have an account? <a href="#" onclick="showTab('login')">Login</a></div>
  </div>

</div>

<script>
  function showTab(tab) {
    document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('signupForm').style.display = tab === 'signup' ? 'block' : 'none';
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
  }
</script>

</body>
</html>
